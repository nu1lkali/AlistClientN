def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def signingKeyAlias = localProperties.getProperty('keyAlias')
def signingKeyPassword = localProperties.getProperty('keyPassword')
def signingStoreFile = localProperties.getProperty('storeFile')
def signingStorePassword = localProperties.getProperty('storePassword')
def hasStoreFile = signingStoreFile != null && signingStoreFile != ''

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

android {
    namespace "com.github.alist.client"
    compileSdk 36
    ndkVersion "26.1.10909125"

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
        freeCompilerArgs += [
            '-opt-in=kotlin.RequiresOptIn',
            '-Xjvm-default=all'
        ]
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.github.alist.client"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion 26  // 提升到 26 以支持 AndroidDocViewer
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    signingConfigs {
        if (hasStoreFile) {
            release {
                keyAlias = signingKeyAlias
                keyPassword = signingKeyPassword
                storeFile = file(signingStoreFile)
                storePassword = signingStorePassword
            }
        }
    }

    buildTypes {
        if (hasStoreFile) {
            debug {
                signingConfig signingConfigs.release
            }
        }
        release {
            if (hasStoreFile) {
                signingConfig signingConfigs.release
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    packagingOptions {
        pickFirst 'lib/*/libc++_shared.so'
        pickFirst 'lib/*/libmpv.so'
        pickFirst 'lib/*/libmediakitandroidhelper.so'
    }

    splits {
        abi {
            enable true
            reset()
            include "armeabi-v7a", "arm64-v8a", "x86_64"
            universalApk true
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation(fileTree("libs"))
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'com.squareup.okio:okio:3.6.0'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'androidx.viewpager2:viewpager2:1.0.0'
    implementation("com.google.code.gson:gson:2.10.1")
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.github.CarGuo.GSYVideoPlayer:gsyVideoPlayer-java:v8.4.0-release-jitpack'
    implementation 'com.github.CarGuo.GSYVideoPlayer:GSYVideoPlayer-exo2:v8.4.0-release-jitpack'
//    implementation 'com.github.CarGuo.GSYVideoPlayer:gsyVideoPlayer-arm64:v8.4.0-release-jitpack'
//    implementation 'com.github.CarGuo.GSYVideoPlayer:gsyVideoPlayer-armv7a:v8.4.0-release-jitpack'
    implementation 'com.github.CarGuo.GSYVideoPlayer:gsyVideoPlayer-ex_so:v8.4.0-release-jitpack'
    // PhotoView for HEIC viewer gesture support
    implementation 'com.github.chrisbanes:PhotoView:2.3.0'
    // ExifInterface for HEIC viewer EXIF reading
    implementation 'androidx.exifinterface:exifinterface:1.3.7'
    // AndroidDocViewer for Office file preview - 本地模块
    implementation project(':docviewer')
    // Media session for background playback
    implementation 'androidx.media:media:1.7.1'
    // MPV player with PiP support - 本地 mpvEx 版本
    implementation files('libs/mpv-android-lib-v0.0.1.aar')
    
    // ============ Compose 依赖 (mpvEx 播放器) ============
    def composeBom = platform('androidx.compose:compose-bom:2024.02.00')
    implementation composeBom
    
    // Compose 核心
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.ui:ui-graphics'
    implementation 'androidx.compose.ui:ui-tooling-preview'
    implementation 'androidx.compose.material3:material3'
    implementation 'androidx.compose.material:material-icons-extended'
    implementation 'androidx.compose.foundation:foundation'
    implementation 'androidx.compose.animation:animation'
    implementation 'androidx.activity:activity-compose:1.9.0'
    implementation 'androidx.compose.runtime:runtime'
    implementation 'androidx.compose.runtime:runtime-livedata'
    
    // ConstraintLayout for Compose
    implementation 'androidx.constraintlayout:constraintlayout-compose:1.0.1'
    
    // Navigation Compose
    implementation 'androidx.navigation:navigation-compose:2.7.7'
    
    // Koin for Dependency Injection
    implementation 'io.insert-koin:koin-android:3.5.6'
    implementation 'io.insert-koin:koin-androidx-compose:3.5.6'
    implementation 'io.insert-koin:koin-core:3.5.6'
    
    // Room Database
    implementation 'androidx.room:room-runtime:2.6.1'
    implementation 'androidx.room:room-ktx:2.6.1'
    annotationProcessor 'androidx.room:room-compiler:2.6.1'
    
    // Coroutines
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.7.3'
    
    // Serialization
    implementation 'org.jetbrains.kotlinx:kotlinx-serialization-json:1.6.3'
    
    // DataStore Preferences
    implementation 'androidx.datastore:datastore-preferences:1.0.0'
    
    // Media3 for media controls
    implementation 'androidx.media3:media3-session:1.2.1'
    implementation 'androidx.media3:media3-ui:1.2.1'
    implementation 'androidx.media3:media3-common:1.2.1'
    implementation 'androidx.media3:media3-exoplayer:1.2.1'
    
    // Lifecycle
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-compose:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-compose:2.7.0'
    
    // Accompanist Permissions
    implementation 'com.google.accompanist:accompanist-permissions:0.34.0'
    
    // DocumentFile
    implementation 'androidx.documentfile:documentfile:1.0.1'
    
    // Collection
    implementation 'androidx.collection:collection-ktx:1.2.0'
}
